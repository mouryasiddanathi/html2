<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKR E-Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="SKR-header js-standard-header"> 
    <div class="SKR-header-left-section">
      <a href="javascript:void(0);" onclick="navigateTo('home')" class="header-link">
        <img class="SKR-logo" src="../photos/SKR_LOGO1BG.png" width="100" height="100" alt="SKR Logo">
        <img class="SKR-mobile-logo" src="../photos/SKR-SHORT-LOGO!.png" alt="SKR Mobile Logo">
      </a>
    </div>
    <div class="SKR-header-middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <img class="search-icon" src="../images/icons/search-icon.png" alt="Search">
      </button>
    </div>
    <div class="SKR-header-right-section">
      <a class="orders-link header-link" href="javascript:void(0);" onclick="navigateTo('orders')">
        <span class="returns-text">Returns</span>
        <span class="orders-text">& Orders</span>
      </a>
      <a class="cart-link header-link" href="javascript:void(0);" onclick="navigateTo('checkout')">
        <img class="cart-icon" src="../images/icons/cart-icon .png" alt="Cart">
        <div class="cart-quantity js-cart-quantity">0</div>
        <div class="cart-text">Cart</div>
      </a>
    </div>
  </div>

  <div class="checkout-header js-checkout-header" style="display: none;">
    <div class="header-content">
      <div class="checkout-header-left-section">
        <a href="javascript:void(0);" onclick="navigateTo('home')" class="header-link">
          <img class="SKR-logo" src="../photos/SKR_LOGO1BG.png" alt="SKR Logo">
          <img class="SKR-mobile-logo" src="../photos/SKR-SHORT-LOGO!.png" alt="SKR Mobile Logo">
        </a>
      </div>
      <div class="checkout-header-middle-section">
        Checkout (<a class="return-to-home-link" href="javascript:void(0);" onclick="navigateTo('home')"><span class="js-items-count-header">0</span> items</a>)
      </div>
      <div class="checkout-header-right-section">
        <img src="../images/icons/checkout-lock-icon.png" alt="Secure checkout">
      </div>
    </div>
  </div>

  <div id="page-home" class="page-view">
    <div class="main">
      <div class="products-grid js-products-grid"></div>
    </div>
  </div>
  <div id="page-checkout" class="page-view" style="display:none;">
    <div class="main">
      <div class="page-title">Review your order</div>
      <div class="checkout-grid">
        <div class="order-summary"></div>
        <div class="payment-summary">
          <div class="payment-summary-title">Order Summary</div>
          <div class="payment-summary-row">
            <div>Items (<span class="js-items-count">0</span>):</div>
            <div class="payment-summary-money js-payment-items">₹0.00</div>
          </div>
          <div class="payment-summary-row">
            <div>Shipping &amp; handling:</div>
            <div class="payment-summary-money js-payment-shipping">₹0.00</div>
          </div>
          <div class="payment-summary-row subtotal-row">
            <div>Total before tax:</div>
            <div class="payment-summary-money js-payment-subtotal">₹0.00</div>
          </div>
          <div class="payment-summary-row">
            <div>Estimated tax (10%):</div>
            <div class="payment-summary-money js-payment-tax">₹0.00</div>
          </div>
          <div class="payment-summary-row total-row">
            <div>Order total:</div>
            <div class="payment-summary-money js-payment-total">₹0.00</div>
          </div>
          <button class="place-order-button button-primary">Place your order</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page-orders" class="page-view" style="display:none;">
    <div class="main">
      <div class="page-title">Your Orders</div>
      <div class="orders-grid"></div>
    </div>
  </div>

  <div id="page-tracking" class="page-view" style="display:none;">
    <div class="main">
      <div class="order-tracking">
        <a class="back-to-orders-link link-primary" href="javascript:void(0);" onclick="navigateTo('orders')">←View all orders</a>
        <div class="delivery-date">Loading...</div>
        <div class="product-info">Loading product name...</div>
        <div class="product-info">Quantity: ...</div>
        <img class="product-image" src="" alt="Product image">
        <div class="progress-labels-container">
          <div class="progress-label">Preparing</div>
          <div class="progress-label">Shipped</div>
          <div class="progress-label">Delivered</div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
