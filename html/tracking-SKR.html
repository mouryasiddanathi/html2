<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracking-SKR</title>
   <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/skr-header.css">
    <link rel="stylesheet" href="../styles/tracking.css">
</head>
<body>
  <div class="SKR-header">
      <div class="SKR-header-left-section">
        <a href="srk.html" class="header-link">
          <img class="SKR-logo"
            src="../photos/SKR_LOGO1BG.png"> 
          <img class="SKR-mobile-logo"
            src="../photos/SKR-SHORT-LOGO!.png">
        </a>
      </div>
      <div class="SKR-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="../images/icons/search-icon.png">
        </button>
      </div>
      <div class="SKR-header-right-section">
        <a class="orders-link header-link" href="orders-SKR.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout-SKR.html">
          <img class="cart-icon" src="../images/icons/cart-icon .png">
          <div class="cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>
    <div class="main">
      <div class="order-tracking">
        <a class="back-to-orders-link link-primary" href="orders-SKR.html">
          ←View all orders
        </a>

        <div class="delivery-date">Loading...</div>

      <div class="product-info">Loading product name...</div>
      <div class="product-info">Quantity: ...</div>

      <img class="product-image"
        src="../images/products/athletic-cotton-socks-6-pairs.jpg"
        alt="Product image">

      <!--
        Status labels: "current-status" class (orange colour) is
        added dynamically by tracking.js based on the item's status.
      -->
      <div class="progress-labels-container">
        <div class="progress-label">Preparing</div>
        <div class="progress-label">Shipped</div>
        <div class="progress-label">Delivered</div>
      </div>

      <!--
        Progress bar: width is animated by tracking.js using
        a CSS transition (width: 0% → target% over 1 second).
      -->
      <div class="progress-bar-container">
        <div class="progress-bar" style="width: 0%;"></div>
      </div>
    </div>
    <script src="../skrjs/cart.js"></script>
    <script src="../skrjs/tracking.js"></script>
  </body>
</html>
