<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/skr-header.css">
    <link rel="stylesheet" href="../styles/orders.css">
</head>
<body>
  <div class="SKR-header">
      <div class="SKR-header-left-section">
        <a href="srk.html" class="header-link">
          <img class="SKR-logo"
            src="../photos/SKR_LOGO1BG.png">

            src="../photos/SKR-SHORT-LOGO!.png">

      </div>
      <div class="SKR-header-middle-section">

        </button>
      </div>
      <div class="SKR-header-right-section">

      </div>

       <div class="main">

      This div starts EMPTY.

    </div>
  </div>

    <script src="../skrjs/orders.js"></script>
