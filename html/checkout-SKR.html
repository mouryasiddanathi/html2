<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout-SKR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/checkout-header.css">
    <link rel="stylesheet" href="../styles/checkout.css">
  </head>
<body>
  <div class="checkout-header">
      <div class="header-content">
        <div class="checkout-header-left-section">
          <a href="srk.html" class="header-link">
            <img class="SKR-logo" src="../photos/SKR_LOGO1BG.png">
            <img class="SKR-mobile-logo" src="../photos/SKR-SHORT-LOGO!.png">
          </a>
        </div>
        <div class="checkout-header-middle-section">
          Checkout (<a class="return-to-home-link"
            href="srk.html" class="header-link"><span class="js-item-count">0</span>items</a>)
        </div>
         <div class="checkout-header-right-section">
          <img src="../images/icons/checkout-lock-icon.png" alt="Secure checkout">
        </div>
      </div>
    </div>
    <div class="main">
      <div class="page-title">Review your order</div>

      <div class="checkout-grid">

      <!--
        This div starts EMPTY.
        checkout.js will fill it with cart item cards dynamically.
        The class "order-summary" is used as a selector in JS.
      -->
      <div class="order-summary">
        <!-- Cart items rendered by checkout.js -->
      </div>

      <!-- Right panel: price breakdown -->
      <div class="payment-summary">
        <div class="payment-summary-title">Order Summary</div>

        <div class="payment-summary-row">
          <div>Items (<span class="js-items-count">0</span>):</div>
          <!--
            Each js-payment-* span is updated by renderPaymentSummary()
            in checkout.js whenever prices need to change.
          -->
          <div class="payment-summary-money js-payment-items">₹0.00</div>
        </div>

        <div class="payment-summary-row">
          <div>Shipping &amp; handling:</div>
          <div class="payment-summary-money js-payment-shipping">₹0.00</div>
        </div>

        <div class="payment-summary-row subtotal-row">
          <div>Total before tax:</div>
          <div class="payment-summary-money js-payment-subtotal">₹0.00</div>
        </div>

        <div class="payment-summary-row">
          <div>Estimated tax (10%):</div>
          <div class="payment-summary-money js-payment-tax">₹0.00</div>
        </div>

        <div class="payment-summary-row total-row">
          <div>Order total:</div>
          <div class="payment-summary-money js-payment-total">₹0.00</div>
        </div>

        <!--
          Clicking this button triggers checkout.js's
          attachPlaceOrderListener() function.
        -->
        <button class="place-order-button button-primary">
          Place your order
        </button>
      </div>

    </div>
  </div>

    <script src="../skrjs/products.js"></script>
    <script src="../skrjs/cart.js"></script>
    <script src="../skrjs/checkout.js"></script>
  </body>
</html>
